<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>عيد مبارك</title>

<!-- خط عربي جميل -->
<link href="https://fonts.googleapis.com/css2?family=Amiri&family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  padding: 0;
  font-family: 'Cairo', sans-serif;
  background: radial-gradient(circle at top, #0f2027, #203a43, #000);
  overflow: hidden;
  color: white;
}

/* نجوم متحركة */
.stars {
  position: absolute;
  width: 100%;
  height: 100%;
  background: transparent;
  box-shadow: 50px 100px #fff, 150px 200px #fff, 300px 50px #fff,
              400px 300px #fff, 600px 150px #fff, 800px 250px #fff;
  animation: twinkle 3s infinite alternate;
}

@keyframes twinkle {
  from {opacity: 0.3;}
  to {opacity: 1;}
}

/* المحتوى */
.container {
  position: relative;
  z-index: 2;
  text-align: center;
  top: 50%;
  transform: translateY(-50%);
  padding: 20px;
}

/* عنوان عيد مبارك */
h1 {
  font-family: 'Amiri', serif;
  font-size: 60px;
  color: gold;
  text-shadow: 0 0 20px gold;
  margin-bottom: 20px;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from {text-shadow: 0 0 10px gold;}
  to {text-shadow: 0 0 30px gold;}
}

/* الاسم */
.name {
  font-size: 70px;
  color: #ffd700;
  margin: 20px 0;
}

/* النص */
p {
  font-size: 22px;
  line-height: 1.8;
  color: #eee;
}

/* ألعاب نارية بسيطة */
.firework {
  position: absolute;
  width: 5px;
  height: 5px;
  background: gold;
  border-radius: 50%;
  animation: explode 1.5s infinite;
}

@keyframes explode {
  0% {transform: scale(1); opacity: 1;}
  100% {transform: scale(10); opacity: 0;}
}
</style>
</head>

<body>

<div class="stars"></div>

<div class="container">
  <h1>🌙 عيد مبارك 🌙</h1>

  <div class="name">محمد</div>

  <p>
    تقبل الله منا ومنكم صالح الأعمال 🤍<br>
    وكل عام وأنتم بخير ✨<br><br>
    عساكم من العائدين والفائزين 🌙
  </p>
</div>

<!-- تأثيرات ألعاب نارية -->
<div class="firework" style="top:20%; left:30%;"></div>
<div class="firework" style="top:40%; left:70%;"></div>
<div class="firework" style="top:70%; left:50%;"></div>

</body>
</html>
