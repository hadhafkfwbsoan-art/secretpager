<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>عيد مبارك</title>

<link href="https://fonts.googleapis.com/css2?family=Amiri&family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  padding: 0;
  font-family: 'Cairo', sans-serif;
  background: radial-gradient(circle at top, #0f2027, #203a43, #000);
  overflow: hidden;
  color: white;
}

/* نجوم */
.stars {
  position: absolute;
  width: 100%;
  height: 100%;
  background: transparent;
  box-shadow:
    50px 100px #fff, 150px 200px #fff, 300px 50px #fff,
    400px 300px #fff, 600px 150px #fff, 800px 250px #fff,
    900px 100px #fff, 1000px 200px #fff;
  animation: twinkle 3s infinite alternate;
}

@keyframes twinkle {
  from {opacity: 0.3;}
  to {opacity: 1;}
}

/* قمر */
.moon {
  position: absolute;
  top: 10%;
  right: 10%;
  width: 120px;
  height: 120px;
  background: radial-gradient(circle, #fff, #ddd);
  border-radius: 50%;
  box-shadow: 0 0 40px #fff;
  animation: float 6s infinite ease-in-out;
}

@keyframes float {
  0%,100% {transform: translateY(0);}
  50% {transform: translateY(-20px);}
}

/* المحتوى في الوسط */
.container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  width: 90%;
}

/* عيد مبارك */
h1 {
  font-family: 'Amiri', serif;
  font-size: 65px;
  color: gold;
  text-shadow: 0 0 20px gold;
  margin-bottom: 20px;
}

/* الاسم */
.name {
  font-size: 75px;
  color: #ffd700;
  margin: 20px 0;
  opacity: 0;
  animation: fadeIn 3s forwards;
}

/* النص */
.message {
  font-size: 24px;
  line-height: 2;
  opacity: 0;
  animation: fadeIn 5s forwards;
}

@keyframes fadeIn {
  to {opacity: 1;}
}

/* ألعاب نارية */
.firework {
  position: absolute;
  width: 6px;
  height: 6px;
  background: gold;
  border-radius: 50%;
  animation: explode 1.5s infinite;
}

@keyframes explode {
  0% {transform: scale(1); opacity: 1;}
  100% {transform: scale(12); opacity: 0;}
}
</style>
</head>

<body>

<div class="stars"></div>
<div class="moon"></div>

<div class="container">
  <h1>🌙 عيد مبارك 🌙</h1>

  <div class="name">محمد</div>

  <div class="message">
    تقبل الله منا ومنكم صالح الأعمال 🤍<br>
    وكل عام وأنتم بألف خير ✨<br><br>
    عساكم من العائدين والفائزين 🌙
  </div>
</div>

<!-- ألعاب نارية -->
<div class="firework" style="top:20%; left:25%;"></div>
<div class="firework" style="top:35%; left:70%;"></div>
<div class="firework" style="top:75%; left:50%;"></div>

</body>
</html>
