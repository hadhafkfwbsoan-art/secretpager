<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>عيد مبارك</title>
<style>
body {
  margin: 0;
  padding: 0;
  font-family: 'Tahoma', sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
}

.container {
  animation: fadeIn 2s ease-in-out;
}

h1 {
  font-size: 50px;
  margin-bottom: 20px;
}

.name {
  font-size: 60px;
  color: gold;
  margin: 20px 0;
}

p {
  font-size: 20px;
  opacity: 0.9;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>
<div class="container">
  <h1>🌙 عيد مبارك 🌙</h1>
  <div class="name">محمد</div>
  <p>كل عام وأنت بخير 🤍<br>عساك من العايدين والفايزين ✨</p>
</div>
</body>
</html>
