<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>عيد مبارك</title>

<link href="https://fonts.googleapis.com/css2?family=Amiri&family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  padding: 0;
  font-family: 'Cairo', sans-serif;
  background: radial-gradient(circle at top, #0a0f1f, #111, #000);
  overflow: hidden;
  color: white;
}

/* نجوم متحركة */
.stars {
  position: absolute;
  width: 100%;
  height: 100%;
  background: transparent;
  box-shadow:
    100px 200px #fff, 300px 100px #fff, 500px 300px #fff,
    700px 150px #fff, 900px 250px #fff, 1100px 100px #fff,
    1300px 200px #fff;
  animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
  from {opacity: 0.2;}
  to {opacity: 1;}
}

/* قمر */
.moon {
  position: absolute;
  top: 8%;
  right: 8%;
  width: 140px;
  height: 140px;
  background: radial-gradient(circle, #fff, #ddd);
  border-radius: 50%;
  box-shadow: 0 0 60px #fff;
  animation: float 6s infinite ease-in-out;
}

@keyframes float {
  0%,100% {transform: translateY(0);}
  50% {transform: translateY(-25px);}
}

/* المحتوى في الوسط */
.container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  width: 90%;
}

/* عيد مبارك */
h1 {
  font-family: 'Amiri', serif;
  font-size: 70px;
  color: gold;
  text-shadow: 0 0 20px gold, 0 0 40px orange;
  margin-bottom: 20px;
}

/* اسم متحرك خرافي */
.name {
  font-size: 85px;
  font-weight: bold;
  background: linear-gradient(90deg, gold, white, gold);
  background-size: 200%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: shine 3s infinite linear, floatName 4s ease-in-out infinite;
}

/* لمعان */
@keyframes shine {
  0% {background-position: 0%;}
  100% {background-position: 200%;}
}

/* حركة خفيفة */
@keyframes floatName {
  0%,100% {transform: translateY(0);}
  50% {transform: translateY(-10px);}
}

/* النص */
.message {
  font-family: 'Amiri', serif;
  font-size: 26px;
  line-height: 2;
  margin-top: 20px;
  color: #fff;
  text-shadow: 0 0 10px rgba(255,255,255,0.6);
  animation: fadeIn 4s ease forwards;
  opacity: 0;
}

@keyframes fadeIn {
  to {opacity: 1;}
}

/* تأثير جسيمات (شيء إضافي 🔥) */
.particle {
  position: absolute;
  width: 4px;
  height: 4px;
  background: gold;
  border-radius: 50%;
  animation: rise 6s infinite linear;
}

@keyframes rise {
  from {
    transform: translateY(100vh);
    opacity: 1;
  }
  to {
    transform: translateY(-10vh);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="stars"></div>
<div class="moon"></div>

<div class="container">
  <h1>🌙 عيد مبارك 🌙</h1>

  <div class="name">محمد</div>

  <div class="message">
    تقبل الله منا ومنكم صالح الأعمال 🤍<br>
    وكل عام وأنتم بخير ✨<br><br>
    عساكم من العائدين والفائزين 🌙
  </div>
</div>

<!-- جسيمات ذهبية -->
<div class="particle" style="left:10%; animation-delay:0s;"></div>
<div class="particle" style="left:30%; animation-delay:2s;"></div>
<div class="particle" style="left:50%; animation-delay:1s;"></div>
<div class="particle" style="left:70%; animation-delay:3s;"></div>
<div class="particle" style="left:90%; animation-delay:4s;"></div>

</body>
</html>
